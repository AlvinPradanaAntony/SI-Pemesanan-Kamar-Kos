name: Build Multiplatform Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versi build tanpa awalan v, misalnya 1.0.0"
        required: false
        default: "1.0.0"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Form + Database/KostAiraApp/**"
      - "Form + Database/Backup Database/kostaira.sql"
      - "scripts/build-portable.ps1"
      - "PORTABLE.md"
      - ".github/workflows/build-multiplatform-release.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows x64
            runner: windows-latest
            artifact-name: windows-x64
          - platform: Linux x64
            runner: ubuntu-latest
            artifact-name: linux-x64
          - platform: macOS x64
            runner: macos-15-intel
            artifact-name: macos-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ inputs.version }}") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } else {
            $version = "0.0.${{ github.run_number }}"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Create database config from GitHub Secrets
        shell: pwsh
        env:
          KOSTAIRA_DB_URL: ${{ secrets.KOSTAIRA_DB_URL }}
          KOSTAIRA_DB_USER: ${{ secrets.KOSTAIRA_DB_USER }}
          KOSTAIRA_DB_SSL: ${{ vars.KOSTAIRA_DB_SSL }}
          KOSTAIRA_DB_PASSWORD: ${{ secrets.KOSTAIRA_DB_PASSWORD }}
          KOSTAIRA_AIVEN_CA_PEM: ${{ secrets.KOSTAIRA_AIVEN_CA_PEM }}
        run: |
          $projectDir = "Form + Database/KostAiraApp"
          $backupDir = "Form + Database/Backup Database"
          New-Item -ItemType Directory -Force -Path $backupDir | Out-Null

          if (-not $env:KOSTAIRA_DB_URL) {
            throw "GitHub Secret KOSTAIRA_DB_URL belum diisi."
          }

          if (-not $env:KOSTAIRA_DB_USER) {
            throw "GitHub Secret KOSTAIRA_DB_USER belum diisi."
          }

          if (-not $env:KOSTAIRA_DB_PASSWORD) {
            throw "GitHub Secret KOSTAIRA_DB_PASSWORD belum diisi."
          }

          if ($env:KOSTAIRA_AIVEN_CA_PEM) {
            $env:KOSTAIRA_AIVEN_CA_PEM | Set-Content -Path (Join-Path $backupDir "ca.pem") -Encoding ASCII
          }

          @(
            "db.url=$env:KOSTAIRA_DB_URL"
            "db.user=$env:KOSTAIRA_DB_USER"
            "db.password=$env:KOSTAIRA_DB_PASSWORD"
            "db.ssl=$env:KOSTAIRA_DB_SSL"
            "db.ssl.ca.path=ca.pem"
          ) | Set-Content -Path (Join-Path $projectDir "db.properties") -Encoding ASCII

      - name: Build native application package
        shell: pwsh
        run: ./scripts/build-portable.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: KostAiraApp-${{ matrix.artifact-name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          sha256sum KostAiraApp-* > SHA256SUMS.txt

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" release-assets/* --clobber
          else
            gh release create "${{ github.ref_name }}" release-assets/* \
              --generate-notes \
              --title "KostAiraApp ${{ github.ref_name }}"
          fi
