name: Build Multiplatform Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versi build tanpa awalan v, misalnya 1.0.2"
        required: false
        default: "1.0.2"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Form + Database/KostAiraApp/**"
      - "Form + Database/Backup Database/kostaira.sql"
      - "scripts/build-portable.ps1"
      - "PORTABLE.md"
      - "CHANGELOG.md"
      - ".github/workflows/build-multiplatform-release.yml"

permissions:
  contents: write

jobs:
  extract-changelog:
    name: 📋 Extract Changelog
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version dari tag
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Validasi versi release
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -Fq "## [$VERSION]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md belum punya entry untuk versi $VERSION"
            echo "Tambahkan header seperti:"
            echo "## [$VERSION] - $(date +%F)"
            exit 1
          fi

          echo "✅ Versi $VERSION tersedia di CHANGELOG.md"

      - name: Ekstrak release notes dari CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Ambil changelog versi terbaru dan maksimal satu blok collapse riwayat versi sebelumnya.
          NOTES=$(awk -v version="$VERSION" '
            index($0, "## [" version "]") == 1 {found=1; next}
            !found {next}
            /^<!--/ {exit}
            !after_section && /^---$/ {after_section=1; print; next}
            !after_section && /^## \[/ {exit}
            !after_section {print; next}
            after_section && /^<details>/ {details=1; print; next}
            after_section && details {print; if ($0 ~ /^<\/details>/) exit; next}
            after_section && /^[[:space:]]*$/ {print; next}
            after_section {exit}
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "❌ Release notes untuk $VERSION kosong."
            echo "Isi detail perubahan di bawah header ## [$VERSION] sebelum membuat tag release."
            exit 1
          fi

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          {
            echo "## 📋 Apa yang Baru di v$VERSION?"
            echo
            echo "$NOTES"
            echo
            echo "---"
          } > release-notes.md

          echo "✅ Release notes berhasil diekstrak"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows x64
            runner: windows-latest
            artifact-name: windows-x64
          - platform: Linux x64
            runner: ubuntu-latest
            artifact-name: linux-x64
          - platform: macOS x64
            runner: macos-15-intel
            artifact-name: macos-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ inputs.version }}") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } else {
            $version = "0.0.${{ github.run_number }}"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Create database config from GitHub Secrets
        shell: pwsh
        env:
          KOSTAIRA_DB_URL: ${{ secrets.KOSTAIRA_DB_URL }}
          KOSTAIRA_DB_USER: ${{ secrets.KOSTAIRA_DB_USER }}
          KOSTAIRA_DB_SSL: ${{ vars.KOSTAIRA_DB_SSL }}
          KOSTAIRA_DB_PASSWORD: ${{ secrets.KOSTAIRA_DB_PASSWORD }}
          KOSTAIRA_AIVEN_CA_PEM: ${{ secrets.KOSTAIRA_AIVEN_CA_PEM }}
        run: |
          $projectDir = "Form + Database/KostAiraApp"
          $backupDir = "Form + Database/Backup Database"
          New-Item -ItemType Directory -Force -Path $backupDir | Out-Null

          if (-not $env:KOSTAIRA_DB_URL) {
            throw "GitHub Secret KOSTAIRA_DB_URL belum diisi."
          }

          if (-not $env:KOSTAIRA_DB_USER) {
            throw "GitHub Secret KOSTAIRA_DB_USER belum diisi."
          }

          if (-not $env:KOSTAIRA_DB_PASSWORD) {
            throw "GitHub Secret KOSTAIRA_DB_PASSWORD belum diisi."
          }

          if ($env:KOSTAIRA_AIVEN_CA_PEM) {
            $env:KOSTAIRA_AIVEN_CA_PEM | Set-Content -Path (Join-Path $backupDir "ca.pem") -Encoding ASCII
          }

          @(
            "db.url=$env:KOSTAIRA_DB_URL"
            "db.user=$env:KOSTAIRA_DB_USER"
            "db.password=$env:KOSTAIRA_DB_PASSWORD"
            "db.ssl=$env:KOSTAIRA_DB_SSL"
            "db.ssl.ca.path=ca.pem"
          ) | Set-Content -Path (Join-Path $projectDir "db.properties") -Encoding ASCII

      - name: Build native application package
        shell: pwsh
        run: ./scripts/build-portable.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: KostAiraApp-${{ matrix.artifact-name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs:
      - extract-changelog
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: KostAiraApp-*
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          sha256sum KostAiraApp-* > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        with:
          tag_name: ${{ needs.extract-changelog.outputs.tag_name }}
          name: KostAiraApp ${{ needs.extract-changelog.outputs.tag_name }}
          body_path: release-notes/release-notes.md
          generate_release_notes: false
          files: |
            release-assets/KostAiraApp-*
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
